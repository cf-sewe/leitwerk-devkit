# Blast-radius tiers for leitwerk-devkit itself (the framework governs its own
# development). The gate — core/bin and core/checks — is the highest tier,
# because a defect there silently weakens every repo that adopts Leitwerk.

[tiers]
T0 = json context lifecycle
T1 = json shell drift parity context lifecycle
T2 = json shell drift selftest parity context lifecycle

# Human-owned files: an agent may propose changes but may not edit them. The
# Claude binding blocks the edit via `leitwerk guard`; CI + review enforce it for
# open-code. Changing these changes the framework's own guarantees.
[human-owned]
leitwerk/constitution.md
leitwerk/tiers.conf

[paths]
core/bin/**       = T2
core/checks/**    = T2
core/cmd/**       = T2
core/internal/**  = T2
core/assets.go    = T2
core/go.mod       = T2
core/Makefile     = T2
**/*.sh           = T2
.github/**        = T2
docs/**           = T0
bindings/**/*.md  = T1
**/*.md           = T0
**/*.json         = T1
bindings/**       = T1
*                 = T1
