# Toolchain for leitwerk-devkit, managed by mise (https://mise.jdx.dev).
#
# The gate (core/) is a compiled Go binary, so Go is required to build it — Node
# is NOT used for the build or the Go tests. Node powers two auxiliary gate
# checks — the `json` check's validator and selftest §9's `.mjs` workflow syntax
# check (`node --check`) — and is the runtime for Claude Code tooling (the review
# workflow). It is not hard-required: each use falls back (jq/python3) or skips
# cleanly, so the gate stays green without it; pinning it just lets those checks
# run at full coverage. Pin here so a fresh checkout and CI resolve the same
# toolchain without asdf.
[tools]
go = "1.26.5"
node = "24.18.0"
