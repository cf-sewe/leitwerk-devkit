# The authoritative gate for open-code adoption. Copy to .github/workflows/ and
# mark "leitwerk gate" a required status check on the protected branch. This is
# what makes the guarantee independent of any agent runtime.
name: leitwerk gate
on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  gate:
    name: leitwerk gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # tier selection needs the diff base

      # The gate is a single static Go binary. `go install` builds it from source
      # (the binary embeds its checks/templates, so it needs no repo layout). Pin a
      # tag instead of @latest once you depend on it; or download a prebuilt release
      # binary onto PATH instead of these two steps.
      - uses: actions/setup-go@v5
        with:
          go-version: "stable"
      - name: Install leitwerk
        run: go install github.com/cf-sewe/leitwerk-devkit/core/cmd/leitwerk@latest

      - name: Run the gate (tier auto-derived from the diff)
        # `verify --auto` derives the highest blast-radius tier from the diff in
        # the CLI itself — the shell rank loop this replaces now lives in one
        # place. The base is a --base FLAG (tier selection only); `--auto` does
        # not read LEITWERK_DIFF_BASE, so drift's one-sided check stays off until
        # M2.3, which will set LEITWERK_DIFF_BASE (for drift, with the
        # living-contract exemption) alongside this flag — two explicit signals.
        run: |
          base="${{ github.event.pull_request.base.sha || github.event.before }}"
          if git rev-parse --verify --quiet "${base}^{commit}" >/dev/null 2>&1; then
            leitwerk verify --auto --base "$base"
          else
            echo "leitwerk: no resolvable diff base ('$base') — running the full gate"
            leitwerk verify --tier T2
          fi
