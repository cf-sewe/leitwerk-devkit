# Leitwerk gates its own development. Unlike a consuming repo (which installs the
# published CLI), this repo builds its in-tree core/ from source so the gate tests
# the code in the PR — not a previously published version. "leitwerk gate" is a
# required check on the protected branch.
name: leitwerk gate
on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  gate:
    name: leitwerk gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - uses: actions/setup-go@v5
        with:
          go-version-file: core/go.mod

      - name: shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Build the gate binary
        run: make -C core build

      - name: Put in-tree CLI on PATH
        run: echo "$PWD/core/bin" >> "$GITHUB_PATH"

      - name: Select tier from changed paths
        id: tier
        run: |
          base="${{ github.event.pull_request.base.sha || github.event.before }}"
          [ -n "$base" ] && [ "$base" != "0000000000000000000000000000000000000000" ] || base="$(git rev-list --max-parents=0 HEAD | tail -1)"
          highest=T0
          rank() { case "$1" in T0) echo 0;; T1) echo 1;; T2) echo 2;; esac; }
          for f in $(git diff --name-only "$base"...HEAD); do
            t=$(leitwerk tier "$f")
            [ "$(rank "$t")" -gt "$(rank "$highest")" ] && highest="$t"
          done
          echo "tier=$highest" >> "$GITHUB_OUTPUT"
          echo "Highest blast-radius tier in this change: $highest"

      - name: Run the gate
        run: leitwerk verify --tier "${{ steps.tier.outputs.tier }}"

  parity:
    # Proves open-code guarantee-parity: the core gate runs with NO agent runtime
    # (no Claude Code, no plugin). Go is the gate's own build toolchain, not an
    # agent runtime, so it is set up; but the OPTIONAL check analyzers (shellcheck,
    # semgrep) are deliberately left out — their absence must make those checks
    # skip cleanly, never fake a pass. If this is green, an open-code adopter gets
    # the same hard guarantee.
    name: open-code parity (no agent runtime)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: core/go.mod
      - name: Build the gate binary
        run: make -C core build
      - name: Put in-tree CLI on PATH
        run: echo "$PWD/core/bin" >> "$GITHUB_PATH"
      - name: Boundary + core gate, shell-only
        run: |
          leitwerk/checks/parity.sh
          leitwerk verify --tier T2
