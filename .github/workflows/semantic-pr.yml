# Validates that each pull-request title is a Conventional Commit. PRs are
# squash-merged, so the title becomes the commit on main that release-please reads
# for versioning and the changelog (see CONTRIBUTING.md). The allowed types/scopes
# are documented in .gitmessage; this check enforces the type + format.
name: semantic-pr
on:
  pull_request:
    types: [opened, edited, synchronize, reopened]
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  semantic-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            chore
            refactor
            test
            ci
            build
            perf
            revert
