# Release automation for the leitwerk gate binary (spec: leitwerk/specs/cli-publish.md).
# release-please opens a Release-PR; merging it creates the core/vX.Y.Z tag + Release.
# The build job runs in the same run (needs + if: release_created), not a separate
# tag-triggered workflow, because a tag pushed by GITHUB_TOKEN would not trigger one.
name: release-please
on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: release-please (Release-PR + tag/release on merge)
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs['core--release_created'] }}
      tag_name: ${{ steps.rp.outputs['core--tag_name'] }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: rp
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-and-upload:
    name: build + attach release binaries
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - uses: jdx/mise-action@v4
        with:
          install: false
      - run: mise install go

      - name: Build the static release matrix
        env:
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          set -euo pipefail
          version="${TAG#core/}"
          mkdir -p dist
          for os in linux darwin; do
            for arch in amd64 arm64; do
              echo "building leitwerk_${os}_${arch} ($version)"
              CGO_ENABLED=0 GOOS="$os" GOARCH="$arch" \
                mise exec -- go build -C core -trimpath \
                  -ldflags "-s -w -X main.version=$version" \
                  -o "../dist/leitwerk_${os}_${arch}" ./cmd/leitwerk
            done
          done
          ( cd dist && sha256sum leitwerk_* > checksums.txt && cat checksums.txt )

      - name: Attach binaries + checksums to the release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: gh release upload "$TAG" dist/leitwerk_* dist/checksums.txt --clobber
