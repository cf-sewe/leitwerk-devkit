<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" width="720" height="400" role="img" aria-label="Leitwerk — the one-pager overview">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0f1430"/>
      <stop offset="1" stop-color="#1a2140"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.85" cy="0.12" r="0.65">
      <stop offset="0" stop-color="#7ea2ff" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#7ea2ff" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
    <clipPath id="card"><rect x="1" y="1" width="718" height="398" rx="22"/></clipPath>
  </defs>

  <g clip-path="url(#card)">
    <rect x="1" y="1" width="718" height="398" fill="url(#bg)"/>
    <rect x="1" y="1" width="718" height="398" fill="url(#grid)"/>
    <rect x="1" y="1" width="718" height="398" fill="url(#glow)"/>
  </g>
  <rect x="1" y="1" width="718" height="398" rx="22" fill="none" stroke="#7ea2ff" stroke-opacity="0.35" stroke-width="1.5"/>

  <text x="48" y="66" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="15" letter-spacing="3.5" fill="#7ea2ff">ONE-PAGER</text>
  <rect x="48" y="78" width="52" height="3" rx="1.5" fill="#7ea2ff"/>
  <text x="672" y="66" text-anchor="end" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="14" letter-spacing="1" fill="#6b769c">leitwerk-devkit</text>

  <text x="46" y="158" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif" font-size="46" font-weight="700" fill="#f5f8ff">Leitwerk, explained</text>
  <text x="48" y="196" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif" font-size="17" fill="#98a3c7">Why a deterministic check — not a plan or a review — decides what ships.</text>

  <g font-family="ui-monospace,SFMono-Regular,Menlo,monospace">
    <rect x="48" y="248" width="176" height="46" rx="11" fill="#0c1024" stroke="#7ea2ff" stroke-opacity="0.35"/>
    <text x="136" y="277" text-anchor="middle" font-size="16" fill="#cfd8f5">spec ↔ code</text>

    <path d="M232 271H266" stroke="#6b769c" stroke-width="2" fill="none"/>
    <path d="M262 266l6 5-6 5" stroke="#6b769c" stroke-width="2" fill="none"/>

    <rect x="274" y="248" width="176" height="46" rx="11" fill="#7ea2ff" fill-opacity="0.14" stroke="#7ea2ff" stroke-opacity="0.7"/>
    <text x="362" y="277" text-anchor="middle" font-size="15" fill="#9db8ff">leitwerk verify</text>

    <path d="M458 271H492" stroke="#6b769c" stroke-width="2" fill="none"/>
    <path d="M488 266l6 5-6 5" stroke="#6b769c" stroke-width="2" fill="none"/>

    <circle cx="512" cy="260" r="7" fill="#4fd69c"/>
    <text x="528" y="265" font-size="15" fill="#9aa6c9">green → ships</text>
    <circle cx="512" cy="286" r="7" fill="#ff6b6b"/>
    <text x="528" y="291" font-size="15" fill="#9aa6c9">red → back</text>
  </g>

  <rect x="48" y="332" width="230" height="42" rx="21" fill="#7ea2ff" fill-opacity="0.14" stroke="#7ea2ff" stroke-opacity="0.55"/>
  <text x="72" y="359" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="15" fill="#bcd0ff">Read the one-pager →</text>
</svg>
